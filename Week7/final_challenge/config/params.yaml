# ── Controlador PID de posición (point_stabilisation_control) ────────────────
control_node:
  ros__parameters:
    kp_lin: 1.5
    ki_lin: 0.5
    kd_lin: 0.7

    kp_ang: 1.75
    ki_ang: 0.6
    kd_ang: 1.0

    dist_tolerance: 0.08
    ang_tolerance:  0.315
    max_linear:     0.15
    max_angular:    0.8
    control_rate:   20.0

# ── Localización (dead reckoning con covarianzas) ────────────────────────────
localisation_node:
  ros__parameters:
    wheel_radius: 0.05    # m
    wheel_base:   0.19    # m  (jetson_lidar_ed real)
    kr:           0.014   # ruido rueda derecha
    kl:           0.014   # ruido rueda izquierda


# ── Tangent Bug ──────────────────────────────────────────────────────────────
tangent_bug_node:
  ros__parameters:
    # Detección de obstáculos / llegada al waypoint
    obstacle_threshold: 0.20   # m  — frente bloqueado para WALL_FOLLOW
    goal_tolerance:     0.10   # m  — radio de llegada a cada waypoint

    # Sectores angulares del LiDAR
    forward_fov_deg:    80.0   # ° — sector frontal para detección
    side_fov_deg:       30.0   # ° — sector lateral para wall-follow

    # Wall-following (BOUNDARY_FOLLOW, cmd_vel directo)
    wall_dist_target:   0.10   # m   — distancia objetivo a la pared seguida
    wall_linear_speed:  0.12   # m/s — velocidad al bordear
    wall_angular_speed: 0.60   # rad/s — velocidad máx. de giro
    kp_wall:            1.20   # ganancia P: wall_error → angular_z

    # ── Específicos de Tangent Bug ──────────────────────────────────────────
    # Detección de endpoints O_i (discontinuidades del LiDAR)
    discontinuity_threshold: 0.30   # m   — salto mínimo entre rayos
    sensor_range:            3.5    # m   — alcance útil del LiDAR
    endpoint_max_angle_deg:  120.0  # °   — descarta endpoints fuera de este cono

    # Compromiso con el endpoint (evita oscilación / spin loco al inicio)
    endpoint_reach_thresh:   0.30   # m   — radio para renovar el target
    endpoint_switch_hyst:    0.40   # m   — histéresis de h para cambiar de endpoint
    setpoint_change_thresh:  0.15   # m   — Δ mínimo para reenviar setpoint al PID

    # Mínimo local → BOUNDARY_FOLLOW
    local_min_tolerance:     0.10   # m   — margen de mejora exigido a h(O*)
    local_min_stall_iters:   15     # iters consecutivas sin mejora → BF

    # Salida de BOUNDARY_FOLLOW
    bf_grace_iters:          20     # iters mínimos antes de poder salir de BF
    leave_margin:            0.05   # m   — d_reach debe ser d_followed-margin

# ── Cámara / ArUco ───────────────────────────────────────────────────────────
camera_node:
  ros__parameters:
    aruco_dict:    'DICT_4X4_250'
    marker_size:   0.15       # m — tamaño del lado del marcador en el mundo
    camera_frame:  'camera_link_optical'
    publish_debug: true