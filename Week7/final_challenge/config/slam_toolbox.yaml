slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # ── Frames ──────────────────────────────────────────────────────────────
    base_frame: base_footprint
    odom_frame: odom
    map_frame:  map

    # ── Topics ──────────────────────────────────────────────────────────────
    scan_topic: /scan

    # ── Modo ────────────────────────────────────────────────────────────────
    mode: mapping             # mapping | localization

    # ── Resolución del mapa ─────────────────────────────────────────────────
    resolution: 0.05          # m / cell
    map_update_interval: 1.0  # s

    # ── tf publish ──────────────────────────────────────────────────────────
    transform_publish_period: 0.05    # s (20 Hz)
    transform_timeout:        0.2
    tf_buffer_duration:       30.0

    # ── Scan matching ───────────────────────────────────────────────────────
    minimum_time_interval:     0.3
    minimum_travel_distance:   0.10
    minimum_travel_heading:    0.10
    throttle_scans:            1

    # ── Solver (Ceres) ──────────────────────────────────────────────────────
    solver_plugin:         solver_plugins::CeresSolver
    ceres_linear_solver:   SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner:  SCHUR_JACOBI
    ceres_trust_strategy:  LEVENBERG_MARQUARDT
    ceres_dogleg_type:     TRADITIONAL_DOGLEG
    ceres_loss_function:   None

    # ── Loop closure ────────────────────────────────────────────────────────
    # Desactivado: en maze pequeño con pasillos repetitivos genera "sal y pimienta"
    # al intentar cerrar un loop que no es real.
    do_loop_closing:                       false
    loop_search_maximum_distance:          3.0
    loop_match_minimum_chain_size:         15      # subido si lo reactivas
    loop_match_maximum_variance_coarse:    1.5     # más exigente
    loop_match_minimum_response_coarse:    0.55    # más exigente
    loop_match_minimum_response_fine:      0.65

    # ── Correlation search ──────────────────────────────────────────────────
    correlation_search_space_dimension:        0.5
    correlation_search_space_resolution:       0.01
    correlation_search_space_smear_deviation:  0.1
    loop_search_space_dimension:               8.0
    loop_search_space_resolution:              0.05
    loop_search_space_smear_deviation:         0.03

    # ── Scan matcher penalties ──────────────────────────────────────────────
    distance_variance_penalty:    0.5
    angle_variance_penalty:       1.0
    fine_search_angle_offset:     0.00349
    coarse_search_angle_offset:   0.349
    coarse_angle_resolution:      0.0349
    minimum_angle_penalty:        0.9
    minimum_distance_penalty:     0.5
    use_response_expansion:       true

    # ── Otros ───────────────────────────────────────────────────────────────
    debug_logging: false
    stack_size_to_use: 40000000
    enable_interactive_mode: false

    # Limita el rango del LiDAR usado por SLAM al rango real del sensor
    min_laser_range: 0.2
    max_laser_range: 12.0
